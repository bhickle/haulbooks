// PDF VIEWER
// -----------------------------------------------------------------------------
function PdfViewer({ b64 }) {
  const canvasRef = useRef(null);
  const [numPages, setNumPages] = useState(0);
  const [currentPage, setCurrentPage] = useState(1);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(false);
  const docRef = useRef(null);
  useEffect(() => {
    if (!b64) return;
    setLoading(true); setError(false);
    const load = async () => {
      try {
        const pdfjsLib = window.pdfjsLib;
        pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
        const binary = atob(b64), bytes = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
        const doc = await pdfjsLib.getDocument({ data: bytes }).promise;
        docRef.current = doc; setNumPages(doc.numPages); setLoading(false); renderPage(doc, 1);
      } catch(e) { setError(true); setLoading(false); }
    };
    if (window.pdfjsLib) { load(); return; }
    const s = document.createElement("script");
    s.src = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js";
    s.onload = load; s.onerror = () => { setError(true); setLoading(false); };
    document.head.appendChild(s);
  }, [b64]);
  const renderPage = async (doc, pageNum) => {
    if (!canvasRef.current || !doc) return;
    const page = await doc.getPage(pageNum);
    const viewport = page.getViewport({ scale: 1.5 });
    const canvas = canvasRef.current;
    canvas.width = viewport.width; canvas.height = viewport.height;
    await page.render({ canvasContext: canvas.getContext("2d"), viewport }).promise;
  };
  const goToPage = (p) => { if (!docRef.current) return; setCurrentPage(p); renderPage(docRef.current, p); };
  if (loading) return <div style={{textAlign:"center",padding:"40px",color:"#7d8590"}}>Loading PDF...</div>;
  if (error) return <div style={{textAlign:"center",padding:"40px",color:"#f85149"}}>Could not render PDF</div>;
  return (
    <div>
      <div style={{overflowX:"auto",borderRadius:"8px",border:"1px solid #21262d",background:"#fff"}}>
        <canvas ref={canvasRef} style={{display:"block",maxWidth:"100%"}} />
      </div>
      {numPages > 1 && (
        <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:"12px",marginTop:"8px"}}>
          <button onClick={()=>goToPage(Math.max(1,currentPage-1))} disabled={currentPage===1} style={{padding:"4px 10px",background:"#1c2330",border:"1px solid #21262d",borderRadius:"6px",color:"#e6edf3",cursor:"pointer",fontSize:"12px"}}>←</button>
          <span style={{fontSize:"12px",color:"#7d8590"}}>Page {currentPage} of {numPages}</span>
          <button onClick={()=>goToPage(Math.min(numPages,currentPage+1))} disabled={currentPage===numPages} style={{padding:"4px 10px",background:"#1c2330",border:"1px solid #21262d",borderRadius:"6px",color:"#e6edf3",cursor:"pointer",fontSize:"12px"}}>→</button>
        </div>
      )}
    </div>
  );
}

    nb:(a,col=C.orange)=>({padding:"7px 16px",border:"none",borderRadius:"8px",background:a?col+"28":"transparent",color:a?col:C.muted,cursor:"pointer",fontSize:"12px",fontWeight:"700",letterSpacing:"0.3px",transition:"all 0.15s",outline:"none"}),
    // Sub-tabs within a module
    subNav:{display:"flex",gap:"0",marginBottom:"20px",borderBottom:`1px solid ${C.border}`,paddingBottom:"0",overflowX:"auto",WebkitOverflowScrolling:"touch"},
    sn:(a)=>({padding:"10px 18px",border:"none",background:"transparent",color:a?C.text:C.muted,cursor:"pointer",fontSize:"13px",fontWeight:a?"600":"400",borderBottom:a?`2px solid ${C.orange}`:"2px solid transparent",marginBottom:"-1px",transition:"all 0.1s",whiteSpace:"nowrap"}),
    main:{padding:isMobile?"12px 12px 80px":"24px 28px",maxWidth:"1400px",margin:"0 auto"},
    g2:{display:"grid",gridTemplateColumns:isMobile?"1fr":"1fr 1fr",gap:"14px"},
    g3:{display:"grid",gridTemplateColumns:isMobile?"1fr 1fr":"1fr 1fr 1fr",gap:"14px"},
    g4:{display:"grid",gridTemplateColumns:isMobile?"1fr 1fr":"repeat(4,1fr)",gap:"14px"},
    card:{background:C.surface,border:`1px solid ${C.border}`,borderRadius:"12px",padding:"20px",boxShadow:"0 2px 8px rgba(0,0,0,0.2)"},
    fCard:(col)=>({background:C.surface,border:`1px solid ${col}33`,borderTop:`3px solid ${col}`,borderRadius:"12px",padding:"20px",cursor:"pointer",transition:"transform 0.15s, box-shadow 0.15s",boxShadow:"0 2px 8px rgba(0,0,0,0.2)"}),
    sh:{fontSize:"11px",fontWeight:"600",color:C.muted,letterSpacing:"2px",textTransform:"uppercase",marginBottom:"14px",marginTop:"28px",display:"flex",alignItems:"center",gap:"8px"},
    sl:{fontSize:"11px",fontWeight:"500",color:C.muted,letterSpacing:"0.5px",textTransform:"uppercase",marginBottom:"6px"},
    sv:{fontSize:"24px",fontWeight:"700",letterSpacing:"-0.5px"},
    badge:(col)=>({display:"inline-block",padding:"2px 8px",borderRadius:"5px",fontSize:"10px",fontWeight:"700",letterSpacing:"0.5px",textTransform:"uppercase",color:col,background:col+"22",border:`1px solid ${col}44`}),
    pill:(done)=>({display:"inline-flex",alignItems:"center",gap:"5px",padding:"5px 10px",borderRadius:"20px",fontSize:"12px",fontWeight:"600",background:done?C.tealD:C.faint,color:done?C.teal:C.muted,border:`1px solid ${done?C.teal+"44":C.border}`,cursor:"pointer",userSelect:"none",transition:"all 0.1s"}),
    tbl:{width:"100%",borderCollapse:"collapse"},
    th:{textAlign:"left",padding:"10px 14px",fontSize:"10px",fontWeight:"700",color:C.muted,letterSpacing:"1px",textTransform:"uppercase",borderBottom:`1px solid ${C.border}`},
    td:{padding:"12px 14px",fontSize:"13px",borderBottom:`1px solid ${C.faint}`,verticalAlign:"middle"},
    modal:{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",display:"flex",alignItems:isMobile?"flex-end":"center",justifyContent:"center",zIndex:200,padding:isMobile?"0":"16px"},
    mbox:{background:C.surface,border:`1px solid ${C.borderHi}`,borderRadius:isMobile?"20px 20px 0 0":"16px",padding:isMobile?"24px 20px 36px":"32px",width:"100%",maxWidth:isMobile?"100%":"520px",maxHeight:"92vh",overflowY:"auto",boxShadow:"0 8px 32px rgba(0,0,0,0.5)"},
    mt:{fontSize:"18px",fontWeight:"700",marginBottom:"4px"},
    ms:{fontSize:"13px",color:C.muted,marginBottom:"20px"},
    lbl:{display:"block",fontSize:"11px",fontWeight:"600",color:C.muted,letterSpacing:"0.5px",textTransform:"uppercase",marginBottom:"5px",marginTop:"14px"},
    inp:{width:"100%",background:C.bg,border:`1px solid ${C.border}`,borderRadius:"8px",color:C.text,padding:"9px 12px",fontSize:"14px",boxSizing:"border-box",fontFamily:"inherit",transition:"border-color 0.15s"},
    sel:{width:"100%",background:C.bg,border:`1px solid ${C.border}`,borderRadius:"8px",color:C.text,padding:"9px 12px",fontSize:"14px",boxSizing:"border-box"},
    br:{display:"flex",gap:"8px",marginTop:"22px"},
    btn:{flex:1,padding:"11px",border:"none",borderRadius:"9px",background:C.orange,color:"#fff",cursor:"pointer",fontSize:"14px",fontWeight:"700"},
    bgh:{flex:1,padding:"11px",border:`1px solid ${C.border}`,borderRadius:"9px",background:"transparent",color:C.muted,cursor:"pointer",fontSize:"14px"},
    tb:(a,col)=>({flex:1,padding:"7px 6px",border:`1px solid ${a?col:C.border}`,borderRadius:"7px",background:a?col+"22":"transparent",color:a?col:C.muted,cursor:"pointer",fontSize:"11px",fontWeight:"700"}),
    pt:{height:"5px",borderRadius:"3px",background:C.faint,overflow:"hidden",marginTop:"6px"},
    pf:(pct,col)=>({height:"100%",width:`${Math.min(pct,100)}%`,background:col,borderRadius:"3px",transition:"width 0.3s"}),
    row:{display:"flex",gap:"10px",flexDirection:isMobile?"column":"row"},
    xBtn:{background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:"18px",padding:"0 0 0 10px",lineHeight:1,opacity:0.6},
    stab:{display:"flex",gap:"0",borderBottom:`1px solid ${C.border}`,marginBottom:"20px",alignItems:"center"},
    st:(a)=>({padding:"10px 18px",border:"none",borderBottom:a?`2px solid ${C.orange}`:"2px solid transparent",background:"transparent",color:a?C.orange:C.muted,cursor:"pointer",fontSize:"12px",fontWeight:"700",letterSpacing:"0.5px",textTransform:"uppercase",transition:"all 0.15s",marginBottom:"-1px"}),
  };

  // -- VendorInput ------------------------------------------------------------
  const VendorInput = ({value, onChange, placeholder="e.g. Sheetz, Lowe's"}) => {
    const [query, setQuery] = useState(value||"");
    const [open, setOpen] = useState(false);
    const [highlightIdx, setHighlightIdx] = useState(0);
    useEffect(()=>{ setQuery(value||""); },[value]);
    const matches = query.length>0 ? vendors.filter(v=>v.toLowerCase().includes(query.toLowerCase())).slice(0,8) : vendors.slice(0,8);
    const showAddNew = query.trim().length>0 && !vendors.find(v=>v.toLowerCase()===query.trim().toLowerCase());
    const select=(name)=>{const added=addVendor(name);setQuery(added);onChange(added);setOpen(false);};
    const handleKey=(e)=>{
      const total=matches.length+(showAddNew?1:0);
      if(e.key==="ArrowDown"){e.preventDefault();setHighlightIdx(i=>Math.min(i+1,total-1));}
      else if(e.key==="ArrowUp"){e.preventDefault();setHighlightIdx(i=>Math.max(i-1,0));}
      else if(e.key==="Enter"){e.preventDefault();if(highlightIdx<matches.length)select(matches[highlightIdx]);else if(showAddNew)select(query.trim());}
      else if(e.key==="Escape"){setOpen(false);}
    };
    return (
      <div style={{position:"relative"}}>
        <input style={S.inp} placeholder={placeholder} value={query} autoComplete="off"
          onChange={e=>{setQuery(e.target.value);onChange(e.target.value);setOpen(true);setHighlightIdx(0);}}
          onFocus={()=>setOpen(true)} onBlur={()=>setTimeout(()=>setOpen(false),150)} onKeyDown={handleKey}/>
        {open&&(matches.length>0||showAddNew)&&(
          <div style={{position:"absolute",top:"100%",left:0,right:0,background:C.surface,border:`1px solid ${C.border}`,borderRadius:"7px",zIndex:300,maxHeight:"200px",overflowY:"auto",marginTop:"2px",boxShadow:"0 4px 16px rgba(0,0,0,0.4)"}}>
            {matches.map((v,i)=>(
              <div key={v} onMouseDown={()=>select(v)} style={{padding:"8px 12px",cursor:"pointer",background:i===highlightIdx?C.faint:"transparent",fontSize:"13px",borderBottom:`1px solid ${C.faint}`}}>{v}</div>
            ))}
            {showAddNew&&(
              <div onMouseDown={()=>select(query.trim())} style={{padding:"8px 12px",cursor:"pointer",background:highlightIdx===matches.length?C.faint:"transparent",fontSize:"13px",color:C.teal,borderTop:matches.length>0?`1px solid ${C.border}`:"none",display:"flex",alignItems:"center",gap:"6px"}}>
                <span style={{fontWeight:"700"}}>+</span> Add "{query.trim()}"
              </div>
            )}
          </div>
        )}
      </div>
    );
  };

  // -- DateFilter -------------------------------------------------------------
  const DateFilter = ({f, setF}) => {
    return (
      <div style={{display:"flex",gap:"4px",alignItems:"center",flexWrap:"wrap"}}>
        <button style={{...S.tb(f.mode==="year"&&f.year==="all",C.muted),flex:"none",padding:"4px 10px",fontSize:"10px"}} onClick={()=>setF(makeFilter("all"))}>All</button>
        {allDataYears.map(y=><button key={y} style={{...S.tb(f.mode==="year"&&f.year===y,C.orange),flex:"none",padding:"4px 12px",fontSize:"11px",fontWeight:"700"}} onClick={()=>setF(makeFilter(y))}>{y}</button>)}
        <button style={{...S.tb(f.mode==="custom",C.purple),flex:"none",padding:"4px 10px",fontSize:"10px"}} onClick={()=>setF({mode:"custom",year:"",start:"2025-01-01",end:new Date().toISOString().split("T")[0]})}>Custom</button>
        {f.mode==="custom"&&(
          <div style={{display:"flex",gap:"6px",alignItems:"center"}}>
            <input type="date" style={{...S.inp,width:"auto",padding:"3px 7px",fontSize:"11px"}} value={f.start} onChange={e=>setF(p=>({...p,start:e.target.value}))}/>
            <span style={{color:C.muted,fontSize:"11px"}}>→</span>
            <input type="date" style={{...S.inp,width:"auto",padding:"3px 7px",fontSize:"11px"}} value={f.end} onChange={e=>setF(p=>({...p,end:e.target.value}))}/>
          </div>
        )}
      </div>
    );
  };

  // -- ExpenseFilterBar -------------------------------------------------------
  const ExpenseFilterBar = ({expenses, search, setSearch, payee, setPayee, cat, setCat}) => {
    const payees = [...new Set(expenses.map(e=>e.payee).filter(Boolean))].sort();
    const cats = [...new Set(expenses.map(e=>e.category).filter(Boolean))].sort();
    const hasFilter = search||payee||cat;
    return (
      <div style={{display:"flex",gap:"6px",flexWrap:"wrap",alignItems:"center"}}>
        <div style={{position:"relative",flex:"2",minWidth:"160px"}}>
          <input style={{...S.inp,paddingLeft:"28px"}} placeholder="Search description, payee..." value={search}
            onChange={e=>setSearch(e.target.value)}/>
          <span style={{position:"absolute",left:"9px",top:"50%",transform:"translateY(-50%)",color:C.muted,fontSize:"13px",pointerEvents:"none"}}>🔍</span>
          {search&&<button onClick={()=>setSearch("")} style={{position:"absolute",right:"8px",top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:"16px",lineHeight:1}}>×</button>}
        </div>
        <select style={{...S.sel,flex:"1",minWidth:"130px"}} value={payee} onChange={e=>setPayee(e.target.value)}>
          <option value="">All Payees</option>
          {payees.map(p=><option key={p} value={p}>{p}</option>)}
        </select>
        <select style={{...S.sel,flex:"1",minWidth:"130px"}} value={cat} onChange={e=>setCat(e.target.value)}>
          <option value="">All Categories</option>
          {cats.map(c=><option key={c} value={c}>{c}</option>)}
        </select>
        {hasFilter&&<button style={{...S.bgh,flex:"none",padding:"6px 10px",fontSize:"11px",color:C.red,borderColor:C.red+"44"}} onClick={()=>{setSearch("");setPayee("");setCat("");}}>Clear</button>}
      </div>
    );
  };

  // -- FlipDetail -------------------------------------------------------------
  function FlipDetail({flip}) {
    const [fFlipDetail, setFFlipDetail] = useState(makeFilter("all"));
    const allFlipExp=flipExpenses(flip.id);
    const fExp=allFlipExp.filter(e=>{
      if(!inDateRange(e.date,fFlipDetail)) return false;
      if(expSearch&&!e.desc.toLowerCase().includes(expSearch.toLowerCase())&&!(e.payee||"").toLowerCase().includes(expSearch.toLowerCase())) return false;
      if(expFilterPayee&&e.payee!==expFilterPayee) return false;
      if(expFilterCat&&e.category!==expFilterCat) return false;
      return true;
    }).sort((a,b)=>b.date.localeCompare(a.date));
    const spent=allFlipExp.reduce((s,e)=>s+e.amount,0);
    const isSold=flip.status==="complete"&&flip.salePrice;
    const actualProfit=isSold?(flip.salePrice-(flip.purchasePrice||0)-spent):null;
    const projProfit=(flip.arv||0)-(flip.purchasePrice||0)-spent;
    const renoTarget=(flip.arv||0)-(flip.purchasePrice||0);const pct=renoTarget>0?(spent/renoTarget)*100:0;
    const fCons=contractors.filter(c=>c.flipId===flip.id);
    const done=flip.milestones.filter(m=>m.done).length;
    const [newMs,setNewMs]=useState("");
    return (
      <div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"16px",flexWrap:"wrap",gap:"10px"}}>
          <button onClick={()=>{setSelectedFlipId(null);setFlipTab("list");}} style={{...S.bgh,flex:"none",padding:"6px 14px",fontSize:"11px"}}>← All Flips</button>
          <div style={{display:"flex",gap:"8px"}}>
            <button style={{...S.bgh,flex:"none",padding:"7px 14px",fontSize:"12px",color:C.blue,borderColor:C.blue+"44"}} onClick={()=>startEditFlip(flip)}>Edit Flip</button>
            <button style={{...S.btn,flex:"none",background:C.teal,padding:"7px 14px",fontSize:"12px"}} onClick={()=>{setConForm(f=>({...f,flipId:flip.id}));setEditingId(null);setModal("contractor");}}>+ Contractor</button>
            <button style={{...S.btn,flex:"none",padding:"7px 14px",fontSize:"12px"}} onClick={()=>{setExpForm({...blankExp,type:"flip",flipId:flip.id,category:"Materials / Supplies"});setReceiptState("idle");setReceiptData(null);setScanTarget("expense");setEditingId(null);setExpModalContext({type:"flip",flipId:flip.id});setModal("expense");}}>+ Expense</button>
          </div>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"18px",flexWrap:"wrap",gap:"10px"}}>
          <div>
            <div style={{fontSize:"20px",fontWeight:"700",color:flip.color}}>{flip.name}</div>
            <div style={{fontSize:"12px",color:C.muted}}>{flip.address}</div>
            {isSold&&<div style={{marginTop:"4px"}}><span style={S.badge(C.teal)}>SOLD {fmtDate(flip.saleDate)}</span></div>}
          </div>
          <span style={S.badge(isSold?(actualProfit>=0?C.teal:C.red):(projProfit>=0?C.blue:C.red))}>
            {isSold?"Actual":"Proj."} {(isSold?actualProfit:projProfit)>=0?"+":""}{fmt(isSold?actualProfit:projProfit)}
          </span>
        </div>
        <div style={S.g4}>
          {[["Purchase",fmt(flip.purchasePrice),C.text],["Reno Spent",fmt(spent),C.yellow],["Total In",fmt((flip.purchasePrice||0)+spent),C.text],[isSold?"Sale Price":"ARV",fmt(isSold?flip.salePrice:flip.arv),isSold?C.teal:C.blue]].map(([l,v,col])=>(
            <div key={l} style={S.card}><div style={S.sl}>{l}</div><div style={{...S.sv,fontSize:"18px",color:col,marginTop:"4px"}}>{v}</div></div>
          ))}
        </div>
        {!isSold&&<div style={{...S.card,marginTop:"12px"}}>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:"11px",marginBottom:"3px"}}><span style={{color:C.muted}}>Reno budget</span><span>{fmt(spent)} of {fmt(renoTarget)} ({pct.toFixed(0)}%)</span></div>
          <div style={S.pt}><div style={S.pf(pct,pct>90?C.red:flip.color)}/></div>
        </div>}
        <div style={S.sh}>Timeline -- {done}/{flip.milestones.length} complete</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:"7px",marginBottom:"12px"}}>
          {flip.milestones.map(m=>(
            <div key={m.id} style={S.pill(m.done)} onClick={()=>toggleMilestone(flip.id,m.id)}>
              <span>{m.done?"✓":"○"}</span><span>{m.label}</span>
              {m.done&&m.date&&<span style={{opacity:0.6,fontSize:"10px"}}>{fmtDate(m.date)}</span>}
            </div>
          ))}
        </div>
        <div style={{display:"flex",gap:"8px"}}>
          <select style={{...S.sel,flex:2}} value={newMs} onChange={e=>setNewMs(e.target.value)}>
            <option value="">-- Add milestone --</option>
            {MS_TEMPLATES.filter(t=>!flip.milestones.find(m=>m.label===t)).map(t=><option key={t}>{t}</option>)}
          </select>
          <button style={{...S.btn,flex:"none",padding:"8px 16px"}} onClick={()=>{if(newMs){addMilestone(flip.id,newMs);setNewMs("");};}}>Add</button>
        </div>
        <div style={S.sh}>Contractors ({fCons.length})</div>
        {fCons.length===0?<div style={{...S.card,color:C.muted,textAlign:"center",padding:"24px",fontSize:"13px"}}>No contractors yet</div>:(
          <div style={S.card}><table style={S.tbl}><thead><tr>{["Name","Trade","Rate / Bid","Paid","Owed","Status",""].map(h=><th key={h} style={S.th}>{h}</th>)}</tr></thead><tbody>
            {fCons.map(c=>{const isDR=c.paymentType==="dayrate";const owed=isDR?null:Math.max(0,(c.totalBid||0)-c.totalPaid);const pp=isDR?0:(c.totalBid?c.totalPaid/c.totalBid*100:0);return(
              <tr key={c.id}>
                <td style={S.td}><div style={{fontWeight:"700"}}>{c.name}</div>{c.phone&&<div style={{fontSize:"11px",color:C.muted}}>{c.phone}</div>}</td>
                <td style={S.td}><span style={S.badge(C.blue)}>{c.trade}</span></td>
                <td style={S.td}>{isDR?<span style={{color:C.purple}}>{fmt(c.dayRate)}/day</span>:<span>{fmt(c.totalBid)} bid</span>}</td>
                <td style={S.td}><div>{fmt(c.totalPaid)}</div>{!isDR&&<div style={S.pt}><div style={S.pf(pp,c.status==="complete"?C.teal:C.orange)}/></div>}</td>
                <td style={S.td}>{isDR?<span style={{color:C.muted}}>Open</span>:<span style={{color:owed>0?C.yellow:C.teal}}>{fmt(owed)}</span>}</td>
                <td style={S.td}><span style={S.badge(c.status==="complete"?C.teal:c.status==="pending"?C.muted:C.orange)}>{c.status}</span></td>
                <td style={S.td}>
                  <div style={{display:"flex",gap:"5px"}}>
                    {c.status!=="complete"&&<button onClick={()=>setPayModal({contractorId:c.id,amount:"",days:"",notes:"",date:tod(),isDayRate:isDR,dayRate:c.dayRate,items:[{flipId:c.flipId,type:"Labor",amount:"",notes:""}]})} style={{...S.btn,flex:"none",fontSize:"11px",padding:"5px 10px"}}>{isDR?"Log Week":"Log Pay"}</button>}
                    <button onClick={()=>startEditContractor(c)} style={{...S.bgh,flex:"none",fontSize:"11px",padding:"5px 10px",color:C.blue,borderColor:C.blue+"44"}}>Edit</button>
                    <button onClick={()=>setContractors(p=>p.filter(x=>x.id!==c.id))} style={{...S.bgh,flex:"none",fontSize:"11px",padding:"5px 10px",color:C.red,borderColor:C.red+"44"}}>×</button>
                  </div>
                </td>
              </tr>
            );})}
          </tbody></table></div>
        )}
        <div style={{marginTop:"24px",marginBottom:"10px"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",borderBottom:`1px solid ${C.border}`,paddingBottom:"6px",marginBottom:"10px"}}>
            <span style={{fontSize:"10px",color:C.muted,letterSpacing:"3px",textTransform:"uppercase"}}>Expenses ({fExp.length} of {allFlipExp.length})</span>
            <DateFilter f={fFlipDetail} setF={setFFlipDetail}/>
          </div>
          <ExpenseFilterBar expenses={allFlipExp} search={expSearch} setSearch={setExpSearch} payee={expFilterPayee} setPayee={setExpFilterPayee} cat={expFilterCat} setCat={setExpFilterCat}/>
        </div>
        {fExp.length===0?<div style={{...S.card,color:C.muted,textAlign:"center",padding:"24px",fontSize:"13px"}}>No expenses match filters</div>:(
          <div style={S.card}><table style={S.tbl}><thead><tr>{["Date","Description","Category","Payee","Amount",""].map(h=><th key={h} style={S.th}>{h}</th>)}</tr></thead><tbody>
            {fExp.map(e=>(<tr key={e.id} onClick={()=>{setViewingExpense(e);setModal("viewExpense");}} style={{cursor:"pointer"}}>
              <td style={{...S.td,color:C.muted,whiteSpace:"nowrap",fontSize:"11px"}}>{fmtDate(e.date)}</td>
              <td style={S.td}><div style={{display:"flex",alignItems:"center",gap:"6px"}}>{e.receiptB64&&<span>🧾</span>}<div>{e.desc}</div></div></td>
              <td style={S.td}><span style={S.badge(flip.color)}>{e.category}</span></td>
              <td style={{...S.td,color:C.muted,fontSize:"12px"}}>{e.payee||"--"}</td>
              <td style={{...S.td,fontWeight:"700"}}>{fmt(e.amount)}</td>
              <td style={S.td} onClick={ev=>ev.stopPropagation()}><button onClick={()=>deleteExpense(e.id)} style={S.xBtn}>×</button></td>
            </tr>))}
          </tbody></table></div>
        )}
      </div>
    );
  }

  const selectedFlip=flips.find(f=>f.id===selectedFlipId);

  // -------------------------------------------------------------------------
  // RENDER
  // -------------------------------------------------------------------------
  return (
    <div style={S.app}>
      {loading&&<div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:"16px"}}><div style={{fontSize:"32px"}}>⏳</div><div style={{color:C.orange,fontWeight:"700",letterSpacing:"2px",textTransform:"uppercase",fontSize:"13px"}}>Loading HaulBooks...</div></div>}
      {!loading&&dbError&&<div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:"16px",padding:"32px"}}><div style={{fontSize:"32px"}}>⚠️</div><div style={{color:C.red,fontWeight:"700",fontSize:"15px"}}>Database Error</div><div style={{color:C.muted,fontSize:"12px",textAlign:"center",maxWidth:"400px"}}>{dbError}</div><button style={{...S.btn,flex:"none",padding:"10px 24px"}} onClick={()=>window.location.reload()}>Retry</button></div>}
      {!loading&&!dbError&&<>

      {/* -- HEADER -- */}
      <header style={S.hdr}>
        <div style={{minWidth:"130px"}}>
          <div style={S.logo}>Mon Valley Hauling</div>
          <div style={S.logoSub}>& Services</div>
        </div>
        <nav style={S.nav}>
          {[
            ["dashboard","📊 Dashboard",C.blue],
            ["hauling","🚛 Hauling",C.orange],
            ["flips","🏠 Flips",C.teal],
            ["rentals","🏘 Rentals",C.purple],
            ["reports","📈 Reports",C.yellow],
          ].map(([v,l,col])=>(
            <button key={v} style={S.nb(view===v,col)} onClick={()=>{setView(v);}}>{l}</button>
          ))}
        </nav>
        <div style={{display:"flex",gap:"6px",justifyContent:"flex-end",alignItems:"center"}}>
          <button style={{...S.bgh,flex:"none",padding:"6px 12px",fontSize:"12px"}} onClick={()=>{setGlobalQuery("");setGlobalSearch(true);}}>🔍</button>
          <button style={{...S.btn,flex:"none",padding:"6px 12px",fontSize:"10px",background:C.muted+"44",color:C.muted,border:`1px solid ${C.border}`}} onClick={()=>setView("settings")}>⚙</button>
        </div>
      </header>

      <main style={S.main}>

        {/* ==================================================================
            DASHBOARD
        ================================================================== */}
        {view==="dashboard"&&(()=>{
          const now = new Date();
          const thisMonth = now.toISOString().slice(0,7);
          const lastMonthDate = new Date(now.getFullYear(), now.getMonth()-1, 1);
          const lastMonth = lastMonthDate.toISOString().slice(0,7);
          const thisYear = now.getFullYear().toString();

          // This month vs last month
          const haulingThisMonth = haulingIncome.filter(i=>i.date.startsWith(thisMonth)).reduce((s,i)=>s+i.amount,0);
          const haulingLastMonth = haulingIncome.filter(i=>i.date.startsWith(lastMonth)).reduce((s,i)=>s+i.amount,0);
          const expThisMonth = haulingExpenses.filter(e=>e.date.startsWith(thisMonth)).reduce((s,e)=>s+e.amount,0);
          const expLastMonth = haulingExpenses.filter(e=>e.date.startsWith(lastMonth)).reduce((s,e)=>s+e.amount,0);
          const haulingYTD = haulingIncome.filter(i=>i.date.startsWith(thisYear)).reduce((s,i)=>s+i.amount,0);
          const expYTD = haulingExpenses.filter(e=>e.date.startsWith(thisYear)).reduce((s,e)=>s+e.amount,0);

          // Rent status per property -- has each property paid this month?
          const rentStatusByProp = rentalProperties.map(prop=>{
            const payments = income.filter(i=>i.jobType==="Rent Payment"&&i.propertyId===prop.id);
            const paidThisMonth = payments.some(i=>i.date.startsWith(thisMonth));
            const paidLastMonth = payments.some(i=>i.date.startsWith(lastMonth));
            const lastPayment = payments.sort((a,b)=>b.date.localeCompare(a.date))[0];
            return {prop, paidThisMonth, paidLastMonth, lastPayment};
          });

          // Overdue flips -- past target sale date
          const today = tod();
          const overdueFlips = flips.filter(f=>f.status==="active"&&f.targetSaleDate&&f.targetSaleDate<today);

          // Unified recent activity -- last 8 across all types
          const allRecent = [
            ...haulingIncome.map(i=>({...i,_type:"job",_label:i.customer,_sub:i.jobType,_col:C.teal,_amt:i.amount})),
            ...rentalIncome.map(i=>{const p=rentalProperties.find(r=>r.id===i.propertyId);return{...i,_type:"rent-inc",_label:p?.address||"Rent",_sub:"Rental Income",_col:C.purple,_amt:i.amount};}),
            ...haulingExpenses.map(e=>({...e,_type:"haul-exp",_label:e.desc||e.payee||e.category,_sub:"Hauling · "+e.category,_col:C.red,_amt:-e.amount})),
            ...rentalExpenses.map(e=>{const p=rentalProperties.find(r=>r.id===e.propertyId);return{...e,_type:"rent-exp",_label:e.desc||e.payee||e.category,_sub:(p?.address||"Rental")+" · "+e.category,_col:C.red,_amt:-e.amount};}),
            ...expenses.filter(e=>!!e.flipId).map(e=>{const f=flips.find(fl=>fl.id===e.flipId);return{...e,_type:"flip-exp",_label:e.desc||e.payee||e.category,_sub:(f?.name||"Flip")+" · "+e.category,_col:C.red,_amt:-e.amount};}),
          ].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,8);

          const Trend = ({curr,prev}) => {
            if(!prev||prev===0) return null;
            const pct = Math.round((curr-prev)/prev*100);
            const up = pct >= 0;
            return <span style={{fontSize:"10px",fontWeight:"700",color:up?C.teal:C.red,marginLeft:"6px"}}>{up?"▲":"▼"}{Math.abs(pct)}% vs last mo</span>;
          };

          return (<>
            {/* -- Quick New button row -- */}
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"20px",flexWrap:"wrap",gap:"10px"}}>
              <div>
                <div style={{fontSize:"18px",fontWeight:"700"}}>Overview</div>
                <div style={{fontSize:"12px",color:C.muted}}>{now.toLocaleString("en-US",{month:"long",year:"numeric"})}</div>
              </div>
              {!isMobile&&<button style={{...S.btn,flex:"none",padding:"10px 20px",fontSize:"13px",background:C.orange}} onClick={()=>setQuickNew(true)}>+ New</button>}
            </div>

            {/* -- KPI cards -- 2x2 grid, this month + YTD -- */}
            <div style={S.g2}>
              {/* Hauling this month */}
              <div style={{...S.card,borderTop:`3px solid ${C.orange}`}} onClick={()=>{setView("hauling");setHaulingTab("jobs");}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                  <div style={S.sl}>🚛 Hauling -- This Month</div>
                  <Trend curr={haulingThisMonth} prev={haulingLastMonth}/>
                </div>
                <div style={{...S.sv,color:C.orange,marginTop:"4px"}}>{fmt(haulingThisMonth)}</div>
                <div style={{fontSize:"11px",color:C.muted,marginTop:"3px"}}>
                  YTD: {fmt(haulingYTD)} · Net: {fmt(haulingThisMonth - expThisMonth)}
                </div>
                <div style={{...S.pt,marginTop:"8px"}}><div style={{...S.pf(haulingLastMonth>0?Math.min(haulingThisMonth/haulingLastMonth*100,150):100,C.orange)}}/></div>
              </div>

              {/* Rental status */}
              <div style={{...S.card,borderTop:`3px solid ${C.purple}`}} onClick={()=>setView("rentals")}>
                <div style={S.sl}>🏘 Rentals -- This Month</div>
                <div style={{marginTop:"10px",display:"flex",flexDirection:"column",gap:"7px"}}>
                  {rentStatusByProp.map(({prop,paidThisMonth,paidLastMonth,lastPayment})=>(
                    <div key={prop.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <div style={{display:"flex",alignItems:"center",gap:"8px"}}>
                        <div style={{width:"8px",height:"8px",borderRadius:"50%",background:paidThisMonth?C.teal:paidLastMonth?C.yellow:C.red,flexShrink:0}}/>
                        <span style={{fontSize:"12px",fontWeight:"600",color:prop.color}}>{prop.address.split(" ").slice(0,3).join(" ")}</span>
                      </div>
                      <div style={{textAlign:"right"}}>
                        {paidThisMonth
                          ? <span style={{fontSize:"11px",color:C.teal}}>✓ Paid</span>
                          : <span style={{fontSize:"11px",color:C.yellow}}>Unpaid · last: {lastPayment?fmtDate(lastPayment.date):"--"}</span>
                        }
                      </div>
                    </div>
                  ))}
                  {rentalProperties.length===0&&<div style={{fontSize:"12px",color:C.muted}}>No properties</div>}
                </div>
              </div>
            </div>

            {/* -- Active Flips -- */}
            {flips.filter(f=>f.status==="active").length>0&&(<>
              <div style={{...S.sh,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span>Active Flips</span>
                {overdueFlips.length>0&&<span style={{...S.badge(C.red),fontSize:"10px"}}>{overdueFlips.length} PAST TARGET DATE</span>}
              </div>
              <div style={S.g2}>
                {flips.filter(f=>f.status==="active").map(flip=>{
                  const spent=flipTotalSpent(flip.id);
                  const projProfit=(flip.arv||0)-(flip.purchasePrice||0)-spent;
                  const renoTarget=(flip.arv||0)-(flip.purchasePrice||0);
                  const pct=renoTarget>0?(spent/renoTarget)*100:0;
                  const done=flip.milestones.filter(m=>m.done).length;
                  const isOverdue=flip.targetSaleDate&&flip.targetSaleDate<today;
                  const daysLeft=flip.targetSaleDate?Math.ceil((new Date(flip.targetSaleDate)-now)/(1000*60*60*24)):null;
                  return(
                    <div key={flip.id} className="fcard-hover" style={{...S.fCard(flip.color),cursor:"pointer"}} onClick={()=>{setView("flips");setSelectedFlipId(flip.id);}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                        <div>
                          <div style={{fontSize:"15px",fontWeight:"700",color:flip.color}}>{flip.name}</div>
                          <div style={{fontSize:"11px",color:C.muted}}>{flip.address}</div>
                        </div>
                        <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:"4px"}}>
                          <span style={S.badge(projProfit>=0?C.teal:C.red)}>Proj. {projProfit>=0?"+":""}{fmt(projProfit)}</span>
                          {daysLeft!==null&&<span style={{...S.badge(isOverdue?C.red:daysLeft<30?C.yellow:C.muted),fontSize:"9px"}}>{isOverdue?`${Math.abs(daysLeft)}d overdue`:`${daysLeft}d left`}</span>}
                        </div>
                      </div>
                      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"10px",marginTop:"12px"}}>
                        {[["Spent",fmt(spent)],["ARV",fmt(flip.arv)],[`${done}/${flip.milestones.length} steps`,""]].map(([l,v])=>(
                          <div key={l}><div style={S.sl}>{l}</div><div style={{fontWeight:"700",fontSize:"12px"}}>{v||l}</div></div>
                        ))}
                      </div>
                      <div style={S.pt}><div style={S.pf(pct,pct>90?C.red:flip.color)}/></div>
                      <div style={{fontSize:"10px",color:C.muted,marginTop:"3px"}}>{pct.toFixed(0)}% of reno budget</div>
                    </div>
                  );
                })}
              </div>
            </>)}

            {/* -- Recent Activity feed -- */}
            <div style={S.sh}>Recent Activity</div>
            <div style={S.card}>
              {allRecent.length===0&&<div style={{textAlign:"center",color:C.muted,padding:"24px",fontSize:"13px"}}>No activity yet</div>}
              {allRecent.map((r,i)=>(
                <div key={r.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:i<allRecent.length-1?`1px solid ${C.faint}`:"none",cursor:"pointer"}}
                  onClick={()=>{if(r._type==="job"){setViewingJob(r);setModal("viewJob");}else if(r._type==="rent-inc"){startEditRentInc(r);}else{setViewingExpense(r);setModal("viewExpense");}}}>
                  <div style={{display:"flex",alignItems:"center",gap:"10px"}}>
                    <div style={{width:"6px",height:"6px",borderRadius:"50%",background:r._col,flexShrink:0,marginTop:"1px"}}/>
                    <div>
                      <div style={{fontSize:"13px",fontWeight:"600"}}>{r._label}</div>
                      <div style={{fontSize:"11px",color:C.muted}}>{fmtDate(r.date)} · <span style={{color:r._col}}>{r._sub}</span></div>
                    </div>
                  </div>
                  <div style={{fontWeight:"700",color:r._col,fontSize:"13px"}}>{r._amt>=0?"+":""}{fmt(Math.abs(r._amt))}</div>
                </div>
              ))}
            </div>
          </>);
        })()}

        {/* ==================================================================
            HAULING MODULE
        ================================================================== */}
        {view==="hauling"&&(
          <>
            {/* Sub-nav */}
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"0"}}>
              <div style={S.subNav}>
                {[["jobs","Jobs"],["expenses","Expenses"],["mileage","Mileage"],["assets","Assets"]].map(([t,l])=>(
                  <button key={t} style={S.sn(haulingTab===t)} onClick={()=>{setHaulingTab(t);setExpSearch("");setExpFilterPayee("");setExpFilterCat("");}}>{l}</button>
                ))}
              </div>
              {!isMobile&&<div style={{display:"flex",gap:"6px",marginBottom:"1px"}}>
                {haulingTab==="jobs"&&<button style={{...S.btn,flex:"none",background:C.orange,padding:"6px 14px",fontSize:"11px"}} onClick={()=>{setJobForm(blankJob);setEditingId(null);setModal("job");}}>+ Log Job</button>}
                {haulingTab==="expenses"&&<button style={{...S.btn,flex:"none",padding:"6px 14px",fontSize:"11px"}} onClick={()=>{setExpForm({...blankExp,type:"business"});setReceiptState("idle");setReceiptData(null);setScanTarget("expense");setEditingId(null);setExpModalContext("hauling");setModal("expense");}}>+ Add Expense</button>}
                {haulingTab==="mileage"&&<button style={{...S.btn,flex:"none",background:C.blue,padding:"6px 14px",fontSize:"11px"}} onClick={()=>{setTripForm(blankTrip);setEditingId(null);setModal("trip");}}>+ Log Trip</button>}
                {haulingTab==="assets"&&<button style={{...S.btn,flex:"none",background:C.yellow,padding:"6px 14px",fontSize:"11px"}} onClick={()=>{setAssetForm(blankAsset);setEditingId(null);setModal("asset");}}>+ Add Asset</button>}
              </div>}
            </div>

            {/* -- JOBS TAB -- */}
            {haulingTab==="jobs"&&(()=>{
              const filtered=haulingIncome.filter(i=>inDateRange(i.date,fHaulingJobs)).sort((a,b)=>b.date.localeCompare(a.date));
              const total=filtered.reduce((s,i)=>s+i.amount,0);
              return <>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"16px",flexWrap:"wrap",gap:"8px"}}>
                  <DateFilter f={fHaulingJobs} setF={setFHaulingJobs}/>
                  <span style={{fontSize:"11px",color:C.muted}}>{filtered.length} jobs · {fmt(total)}</span>
                </div>
                <div style={S.g3}>
                  {[
                    ["Total Revenue",fmt(total),C.orange],
                    ["Junk Removal",fmt(filtered.filter(i=>i.jobType==="Junk Removal").reduce((s,i)=>s+i.amount,0)),C.teal],
                    ["Estate Cleanout",fmt(filtered.filter(i=>i.jobType==="Estate Cleanout").reduce((s,i)=>s+i.amount,0)),C.purple],
                  ].map(([l,v,col])=>(
                    <div key={l} style={S.card}><div style={S.sl}>{l}</div><div style={{fontSize:"20px",fontWeight:"700",color:col,marginTop:"4px"}}>{v}</div></div>
                  ))}
                </div>
                {isMobile?(
                  <div style={{marginTop:"12px",display:"flex",flexDirection:"column",gap:"8px"}}>
                    {filtered.length===0&&<div style={{...S.card,textAlign:"center",color:C.muted,padding:"36px"}}>No jobs in this period</div>}
                    {filtered.map(i=>(
                      <div key={i.id} style={{...S.card,padding:"14px",cursor:"pointer",borderLeft:`3px solid ${i.jobType==="Estate Cleanout"?C.purple:C.orange}`}} onClick={()=>{setViewingJob(i);setModal("viewJob");}}>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                          <div style={{fontWeight:"700",fontSize:"14px"}}>{i.customer}</div>
                          <div style={{fontWeight:"700",color:C.teal,fontSize:"15px"}}>{fmt(i.amount)}</div>
                        </div>
                        <div style={{display:"flex",gap:"6px",marginTop:"6px",flexWrap:"wrap",alignItems:"center"}}>
                          <span style={{fontSize:"11px",color:C.muted}}>{fmtDate(i.date)}</span>
                          <span style={S.badge(i.jobType==="Estate Cleanout"?C.purple:C.orange)}>{i.jobType}</span>
                          <span style={S.badge(C.blue)}>{i.paymentMethod}</span>
                        </div>
                        {i.phone&&<div style={{fontSize:"11px",color:C.muted,marginTop:"4px"}}>📞 {i.phone}</div>}
                      </div>
                    ))}
                  </div>
                ):(
                  <div style={{...S.card,marginTop:"16px"}}><table style={S.tbl}><thead><tr>{["Date","Customer","Phone","Type","Payment","Amount",""].map(h=><th key={h} style={S.th}>{h}</th>)}</tr></thead><tbody>
                    {filtered.length===0&&<tr><td colSpan={7} style={{...S.td,textAlign:"center",color:C.muted,padding:"36px"}}>No jobs in this period</td></tr>}
                    {filtered.map(i=>(
                      <tr key={i.id} className="hrow" style={{cursor:"pointer"}} onClick={()=>{setViewingJob(i);setModal("viewJob");}}>
                        <td style={{...S.td,color:C.muted,fontSize:"11px",whiteSpace:"nowrap"}}>{fmtDate(i.date)}</td>
                        <td style={{...S.td,fontWeight:"600"}}>{i.customer}</td>
                        <td style={{...S.td,color:C.muted,fontSize:"12px"}}>{i.phone||"--"}</td>
                        <td style={S.td}><span style={S.badge(i.jobType==="Estate Cleanout"?C.purple:C.orange)}>{i.jobType}</span></td>
                        <td style={S.td}><span style={S.badge(C.blue)}>{i.paymentMethod}</span></td>
                        <td style={{...S.td,fontWeight:"700",color:C.teal}}>{fmt(i.amount)}</td>
                        <td style={S.td} onClick={ev=>ev.stopPropagation()}><button onClick={()=>deleteJob(i.id)} style={S.xBtn}>×</button></td>
                      </tr>
                    ))}
                    {filtered.length>0&&<tr style={{borderTop:`2px solid ${C.border}`}}><td colSpan={5} style={{...S.td,fontWeight:"700",color:C.muted,fontSize:"11px"}}>TOTAL</td><td style={{...S.td,fontWeight:"700",color:C.teal,fontSize:"15px"}}>{fmt(total)}</td><td style={S.td}/></tr>}
                  </tbody></table></div>
                )}
              </>;
            })()}

            {/* -- EXPENSES TAB -- */}
            {haulingTab==="expenses"&&(()=>{
              const dateFiltered=haulingExpenses.filter(e=>inDateRange(e.date,fHaulingExp));
              const filtered=dateFiltered.filter(e=>{
                if(expSearch&&!e.desc.toLowerCase().includes(expSearch.toLowerCase())&&!(e.payee||"").toLowerCase().includes(expSearch.toLowerCase())&&!(e.notes||"").toLowerCase().includes(expSearch.toLowerCase())) return false;
                if(expFilterPayee&&e.payee!==expFilterPayee) return false;
                if(expFilterCat&&e.category!==expFilterCat) return false;
                return true;
              }).sort((a,b)=>b.date.localeCompare(a.date));
              const total=filtered.reduce((s,e)=>s+e.amount,0);
              const deductible=filtered.filter(e=>e.category!=="Loan Payment (Principal)").reduce((s,e)=>s+e.amount,0);
              return <>
                <div style={{display:"flex",flexDirection:"column",gap:"8px",marginBottom:"16px"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:"8px"}}>
                    <DateFilter f={fHaulingExp} setF={setFHaulingExp}/>
                    <span style={{fontSize:"11px",color:C.muted}}>{filtered.length} of {dateFiltered.length} · {fmt(total)}</span>
                  </div>
                  <ExpenseFilterBar expenses={dateFiltered} search={expSearch} setSearch={setExpSearch} payee={expFilterPayee} setPayee={setExpFilterPayee} cat={expFilterCat} setCat={setExpFilterCat}/>
                </div>
                <div style={S.g3}>
                  {[["Total Expenses",fmt(total),C.red],["Deductible",fmt(deductible),C.orange],["Non-Deductible (Principal)",fmt(total-deductible),C.muted]].map(([l,v,col])=>(
                    <div key={l} style={S.card}><div style={S.sl}>{l}</div><div style={{fontSize:"18px",fontWeight:"700",color:col,marginTop:"4px"}}>{v}</div></div>
                  ))}
                </div>
                {isMobile?(
                  <div style={{marginTop:"12px",display:"flex",flexDirection:"column",gap:"8px"}}>
                    {filtered.length===0&&<div style={{...S.card,textAlign:"center",color:C.muted,padding:"36px"}}>No expenses in this period</div>}
                    {filtered.map(e=>(
                      <div key={e.id} style={{...S.card,padding:"14px",cursor:"pointer",borderLeft:`3px solid ${C.red}`}} onClick={()=>{setViewingExpense(e);setModal("viewExpense");}}>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:"8px"}}>
                          <div style={{flex:1,minWidth:0}}>
                            <div style={{display:"flex",alignItems:"center",gap:"5px"}}>
                              {e.receiptB64&&<span style={{fontSize:"12px"}}>🧾</span>}
                              <div style={{fontWeight:"600",fontSize:"13px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{e.desc||"—"}</div>
                            </div>
                            <div style={{display:"flex",gap:"6px",marginTop:"5px",flexWrap:"wrap",alignItems:"center"}}>
                              <span style={{fontSize:"11px",color:C.muted}}>{fmtDate(e.date)}</span>
                              <span style={S.badge(C.blue)}>{e.category}</span>
                              {e.payee&&<span style={{fontSize:"11px",color:C.muted}}>{e.payee}</span>}
                            </div>
                          </div>
                          <div style={{fontWeight:"700",fontSize:"15px",color:C.red,whiteSpace:"nowrap"}}>{fmt(e.amount)}</div>
                        </div>
                      </div>
                    ))}
                  </div>
                ):(
                  <div style={{...S.card,marginTop:"16px"}}><table style={S.tbl}><thead><tr>{["Date","Description","Category","Payee","Amount",""].map(h=><th key={h} style={S.th}>{h}</th>)}</tr></thead><tbody>
                    {filtered.length===0&&<tr><td colSpan={6} style={{...S.td,textAlign:"center",color:C.muted,padding:"36px"}}>No expenses in this period</td></tr>}
                    {filtered.map(e=>(
                      <tr key={e.id} className="hrow" style={{cursor:"pointer"}} onClick={()=>{setViewingExpense(e);setModal("viewExpense");}}>
                        <td style={{...S.td,color:C.muted,fontSize:"11px",whiteSpace:"nowrap"}}>{fmtDate(e.date)}</td>
                        <td style={S.td}><div style={{display:"flex",alignItems:"center",gap:"5px"}}>{e.receiptB64&&<span>🧾</span>}<div><div>{e.desc}</div>{e.notes&&<div style={{fontSize:"11px",color:C.muted}}>{e.notes}</div>}</div></div></td>
                        <td style={S.td}><span style={S.badge(C.blue)}>{e.category}</span></td>
                        <td style={{...S.td,color:C.muted,fontSize:"12px"}}>{e.payee||"--"}</td>
                        <td style={{...S.td,fontWeight:"700"}}>{fmt(e.amount)}</td>
                        <td style={S.td} onClick={ev=>ev.stopPropagation()}><button onClick={()=>deleteExpense(e.id)} style={S.xBtn}>×</button></td>
                      </tr>
                    ))}
                    {filtered.length>0&&<tr style={{borderTop:`2px solid ${C.border}`}}><td colSpan={4} style={{...S.td,fontWeight:"700",color:C.muted,fontSize:"11px"}}>TOTAL</td><td style={{...S.td,fontWeight:"700",fontSize:"15px"}}>{fmt(total)}</td><td style={S.td}/></tr>}
                  </tbody></table></div>
                )}
              </>;
            })()}

            {/* -- MILEAGE TAB -- */}
            {haulingTab==="mileage"&&(()=>{
              const filtered=trips.filter(t=>inDateRange(t.date,fMile)).sort((a,b)=>b.date.localeCompare(a.date));
              const totalMiles=filtered.reduce((s,t)=>s+t.miles,0);
              const bizMiles=filtered.filter(t=>t.purpose!=="Personal").reduce((s,t)=>s+t.miles,0);
              return <>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"16px",flexWrap:"wrap",gap:"8px"}}>
                  <DateFilter f={fMile} setF={setFMile}/>
                  <span style={{fontSize:"11px",color:C.muted}}>{filtered.length} trips</span>
                </div>
                <div style={S.g3}>
                  {[["Total Miles",totalMiles.toFixed(1)+" mi",C.blue],["Business Miles",bizMiles.toFixed(1)+" mi",C.teal],["Business Use",totalMiles>0?(bizMiles/totalMiles*100).toFixed(1)+"%":"--",C.orange]].map(([l,v,col])=>(
                    <div key={l} style={S.card}><div style={S.sl}>{l}</div><div style={{fontSize:"20px",fontWeight:"700",color:col,marginTop:"4px"}}>{v}</div></div>
                  ))}
                </div>
                {isMobile?(

                      </div>
                    </div>
                  );
                })}
              </div>
            </>
          );
        })()}

        {/* ==================================================================
            REPORTS MODULE
        ================================================================== */}
        {view==="reports"&&(()=>{
          const inRange=(date)=>{if(reportRange==="year")return date.startsWith(reportYear);return date>=reportStart&&date<=reportEnd;};

          // -- Shared date filter bar --
          const FilterBar = () => (

                  {allDataYears.map(y=><button key={y} style={{...S.tb(reportYear===y,C.orange),flex:"none",padding:"5px 14px",fontSize:"12px",fontWeight:"700"}} onClick={()=>setReportYear(y)}>{y}</button>)}

                    <div style={{fontWeight:"700",fontSize:"16px"}}>{drillData.title}</div>
                    <button onClick={()=>setDrillData(null)} style={S.xBtn}>×</button>
                  </div>
                  <div style={{fontSize:"12px",color:C.muted,marginBottom:"12px"}}>{drillData.rows.length} transactions · {fmt(drillData.rows.reduce((s,r)=>s+r.amount,0))}</div>
                  <div style={{overflowY:"auto",maxHeight:"400px"}}>
                    <table style={S.tbl}><thead><tr>{["Date","Description","Payee","Amount",""].map(h=><th key={h} style={S.th}>{h}</th>)}</tr></thead><tbody>
                      {drillData.rows.sort((a,b)=>b.date.localeCompare(a.date)).map(r=>(

                          <td style={{...S.td,color:C.muted,fontSize:"12px"}}>{r.payee||"--"}</td>
                          <td style={{...S.td,fontWeight:"700"}}>{fmt(r.amount)}</td>
                          <td style={S.td} onClick={ev=>ev.stopPropagation()}><button onClick={()=>deleteExpense(r.id)} style={{...S.xBtn,color:C.red}}>×</button></td>
                        </tr>
                      ))}
                    </tbody></table>
                  </div>
                  <div style={{...S.br,marginTop:"16px"}}>
                    <button style={S.bgh} onClick={()=>setDrillData(null)}>Close</button>
                  </div>
                </div>
              </div>
            );
          };

          // Drillable number cell
          const Drill = ({rows, children, col=C.text}) => (
            <span onClick={()=>rows&&rows.length>0&&setDrillData({title:typeof children==="string"?children:"Transactions",rows})}
              style={{color:col,cursor:rows&&rows.length>0?"pointer":"default",textDecoration:rows&&rows.length>0?"underline dotted":"none",textUnderlineOffset:"3px"}}>

          return (
          <>
            <DrillModal/>

            {/* Sub-tabs */}
            <div style={{...S.stab,marginBottom:"16px"}}>
              {[["hauling","🚛 Hauling"],["rentals","🏘 Rentals"],["flips","🏠 Flips"]].map(([t,l])=>(
                <button key={t} style={S.st(reportTab===t)} onClick={()=>setReportTab(t)}>{l}</button>
              ))}
            </div>

            {/* -- HAULING REPORT -- */}
            {reportTab==="hauling"&&(()=>{
              const rInc=haulingIncome.filter(i=>inRange(i.date));
              const rExp=haulingExpenses.filter(e=>inRange(e.date));
              const rDed=rExp.filter(e=>e.category!=="Loan Payment (Principal)");
              const totalInc=rInc.reduce((s,i)=>s+i.amount,0);
              const totalDed=rDed.reduce((s,e)=>s+e.amount,0);
              const netProfit=totalInc-totalDed;

              // Monthly P&L
              const monthMap={};
              rInc.forEach(i=>{const m=i.date.slice(0,7);if(!monthMap[m])monthMap[m]={inc:0,incRows:[],expRows:[]};monthMap[m].inc+=i.amount;monthMap[m].incRows.push(i);});
              rExp.forEach(e=>{const m=e.date.slice(0,7);if(!monthMap[m])monthMap[m]={inc:0,incRows:[],expRows:[]};monthMap[m].expRows.push(e);});
              const months=Object.entries(monthMap).sort((a,b)=>b[0].localeCompare(a[0]));

              // Schedule C tax map
              const taxMap={};
              rDed.forEach(e=>{const k=TAX_MAP[e.category]||"Miscellaneous";if(!taxMap[k])taxMap[k]=[];taxMap[k].push(e);});
              const taxRows=Object.entries(taxMap).sort((a,b)=>b[1].reduce((s,e)=>s+e.amount,0)-a[1].reduce((s,e)=>s+e.amount,0));

              return (<>
                <FilterBar/>
                <div style={S.g3}>
                  {[{l:"Revenue",v:fmt(totalInc),col:C.teal,sub:`${rInc.length} jobs`},{l:"Deductible Exp.",v:fmt(totalDed),col:C.red,sub:"Schedule C"},{l:"Net Profit",v:fmt(netProfit),col:netProfit>=0?C.teal:C.red,sub:"After deductibles"}].map(s=>(
                    <div key={s.l} style={S.card}><div style={S.sl}>{s.l}</div><div style={{...S.sv,color:s.col,marginTop:"4px"}}>{s.v}</div><div style={{fontSize:"11px",color:C.muted,marginTop:"2px"}}>{s.sub}</div></div>
                  ))}
                </div>

                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:"24px",marginBottom:"8px",borderBottom:`1px solid ${C.border}`,paddingBottom:"6px"}}>
                  <span style={{fontSize:"10px",color:C.muted,letterSpacing:"3px",textTransform:"uppercase"}}>Monthly P&amp;L -- click any row to drill in</span>
                  <div style={{display:"flex",gap:"6px"}}>
                    <button onClick={()=>exportCSV("hauling-jobs")} style={{...S.bgh,flex:"none",padding:"4px 10px",fontSize:"10px"}}>Jobs CSV</button>
                    <button onClick={()=>exportCSV("hauling-exp")} style={{...S.bgh,flex:"none",padding:"4px 10px",fontSize:"10px"}}>Expenses CSV</button>
                  </div>
                </div>
                <div style={S.card}><table style={S.tbl}><thead><tr>{["Month","Revenue","Expenses","Net"].map(h=><th key={h} style={S.th}>{h}</th>)}</tr></thead><tbody>
                  {months.length===0&&<tr><td colSpan={4} style={{...S.td,textAlign:"center",color:C.muted,padding:"24px"}}>No data for this period</td></tr>}
                  {months.map(([m,d])=>{
                    const exp=d.expRows.reduce((s,e)=>s+e.amount,0);
                    const net=d.inc-exp;
                    return(
                      <tr key={m} className="hrow" style={{cursor:"pointer"}} onClick={()=>setDrillData({title:monthLabel(m)+" -- All Transactions",rows:[...d.incRows.map(i=>({...i,desc:i.customer+" ("+i.jobType+")",payee:""})),...d.expRows]})}>
                        <td style={{...S.td,fontWeight:"700"}}>{monthLabel(m)}</td>
                        <td style={{...S.td,color:C.teal}}>{fmt(d.inc)}</td>
                        <td style={{...S.td,color:C.red}}>{fmt(exp)}</td>
                        <td style={{...S.td,fontWeight:"700",color:net>=0?C.teal:C.red}}>{net>=0?"+":""}{fmt(net)}</td>
                      </tr>
                    );
                  })}
                  {months.length>1&&(()=>{const totExp=months.reduce((s,[,d])=>s+d.expRows.reduce((ss,e)=>ss+e.amount,0),0);const totNet=totalInc-totExp;return(
                    <tr style={{borderTop:`2px solid ${C.border}`,background:C.faint}}>
                      <td style={{...S.td,fontWeight:"700",fontSize:"11px",color:C.muted}}>TOTAL</td>
                      <td style={{...S.td,fontWeight:"700",color:C.teal}}>{fmt(totalInc)}</td>
                      <td style={{...S.td,fontWeight:"700",color:C.red}}>{fmt(totExp)}</td>
                      <td style={{...S.td,fontWeight:"700",color:totNet>=0?C.teal:C.red,fontSize:"14px"}}>{totNet>=0?"+":""}{fmt(totNet)}</td>
                    </tr>
                  );})()}
                </tbody></table></div>

                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:"24px",marginBottom:"8px",borderBottom:`1px solid ${C.border}`,paddingBottom:"6px"}}>

                  <button onClick={()=>exportCSV("tax")} style={{...S.bgh,flex:"none",padding:"4px 10px",fontSize:"10px",color:C.teal,borderColor:C.teal+"44"}}>Schedule C CSV</button>
                </div>
                <div style={S.card}>
                  <div style={{padding:"10px 12px",background:C.bg,borderRadius:"7px",marginBottom:"14px",fontSize:"11px",color:C.muted}}>📋 Deductible expenses only. Loan principal excluded.</div>
                  <table style={S.tbl}><thead><tr>{["Tax Category","Amount",""].map(h=><th key={h} style={S.th}>{h}</th>)}</tr></thead><tbody>
                    {taxRows.length===0&&<tr><td colSpan={3} style={{...S.td,textAlign:"center",color:C.muted,padding:"24px"}}>No deductible expenses</td></tr>}
                    {taxRows.map(([cat,rows])=>{
                      const amt=rows.reduce((s,e)=>s+e.amount,0);
                      return(
                        <tr key={cat} className="hrow" style={{cursor:"pointer"}} onClick={()=>setDrillData({title:`Schedule C -- ${cat}`,rows})}>
                          <td style={S.td}>{cat}</td>
                          <td style={{...S.td,fontWeight:"700",color:C.orange}}>{fmt(amt)}</td>
                          <td style={{...S.td,color:C.muted,fontSize:"11px"}}>↗ {rows.length} transactions</td>
                        </tr>
                      );
                    })}
                    {taxRows.length>0&&<tr style={{borderTop:`2px solid ${C.border}`}}><td style={{...S.td,fontWeight:"700"}}>TOTAL DEDUCTIBLE</td><td style={{...S.td,fontWeight:"700",color:C.teal,fontSize:"15px"}}>{fmt(totalDed)}</td><td style={S.td}/></tr>}
                  </tbody></table>
                </div>

                {/* Mileage summary */}
                {trips.filter(t=>inRange(t.date)).length>0&&(<>
                  <div style={S.sh}>Mileage</div>
                  <div style={S.g3}>
                    {(()=>{const rt=trips.filter(t=>inRange(t.date));const biz=rt.filter(t=>t.purpose!=="Personal").reduce((s,t)=>s+t.miles,0);const tot=rt.reduce((s,t)=>s+t.miles,0);return[[`Total Miles`,tot.toFixed(1)+" mi",C.blue],["Business Miles",biz.toFixed(1)+" mi",C.teal],["Business Use",tot>0?(biz/tot*100).toFixed(1)+"%":"--",C.orange]].map(([l,v,col])=><div key={l} style={S.card}><div style={S.sl}>{l}</div><div style={{fontSize:"18px",fontWeight:"700",color:col,marginTop:"4px"}}>{v}</div></div>);})()}
                  </div>
                  <button onClick={()=>exportCSV("mileage")} style={{...S.bgh,flex:"none",padding:"5px 12px",fontSize:"11px",marginTop:"8px"}}>Mileage CSV</button>
                </>)}
              </>);
            })()}

            {/* -- RENTALS REPORT -- */}
            {reportTab==="rentals"&&(()=>{
              // Per-property P&L
              const propData=rentalProperties.map(prop=>{
                const inc=income.filter(i=>i.jobType==="Rent Payment"&&i.propertyId===prop.id&&inRange(i.date));
                const exp=expenses.filter(e=>e.type==="rental"&&(e.propertyId===prop.id||e.propertyId===null)&&inRange(e.date));
                const mortInt=exp.filter(e=>e.category==="Mortgages & Loans").reduce((s,e)=>s+e.amount,0);
                const taxes=exp.filter(e=>e.category==="Taxes").reduce((s,e)=>s+e.amount,0);
                const other=exp.filter(e=>e.category!=="Mortgages & Loans"&&e.category!=="Taxes").reduce((s,e)=>s+e.amount,0);
                const totalInc=inc.reduce((s,r)=>s+r.amount,0);
                const totalExp=exp.reduce((s,e)=>s+e.amount,0);
                return {prop,inc,exp,totalInc,totalExp,mortInt,taxes,other,net:totalInc-totalExp};
              });

              // Monthly combined view
              const monthMap={};
              rentalProperties.forEach(prop=>{
                income.filter(i=>i.jobType==="Rent Payment"&&i.propertyId===prop.id&&inRange(i.date)).forEach(i=>{
                  const m=i.date.slice(0,7);
                  if(!monthMap[m])monthMap[m]={};
                  if(!monthMap[m][prop.id])monthMap[m][prop.id]={inc:0,exp:0};
                  monthMap[m][prop.id].inc+=i.amount;

                expenses.filter(e=>e.type==="rental"&&(e.propertyId===prop.id||e.propertyId===null)&&inRange(e.date)).forEach(e=>{
                  const m=e.date.slice(0,7);
                  if(!monthMap[m])monthMap[m]={};
                  if(!monthMap[m][prop.id])monthMap[m][prop.id]={inc:0,exp:0};
                  monthMap[m][prop.id].exp+=e.amount;

              const months=Object.keys(monthMap).sort().reverse();

              return (<>
                <FilterBar/>

                {/* Side-by-side P&L */}
                <div style={S.sh}>Property P&amp;L -- Side by Side</div>
                <div style={{overflowX:"auto"}}>
                  <table style={{...S.tbl,minWidth:"500px"}}><thead>
                    <tr>
                      <th style={S.th}>Metric</th>
                      {propData.map(({prop})=><th key={prop.id} style={{...S.th,color:prop.color}}>{prop.address}</th>)}
                      <th style={S.th}>Total</th>
                    </tr>
                  </thead><tbody>
                    {[
                      {label:"Rent Collected",key:"totalInc",col:C.teal,drill:d=>d.inc},
                      {label:"Other Expenses",key:"other",col:C.orange,drill:d=>d.exp.filter(e=>e.category!=="Mortgages & Loans"&&e.category!=="Taxes")},
                      {label:"Mortgage / Loans",key:"mortInt",col:C.yellow,drill:d=>d.exp.filter(e=>e.category==="Mortgages & Loans")},
                      {label:"Property Taxes",key:"taxes",col:C.purple,drill:d=>d.exp.filter(e=>e.category==="Taxes")},
                      {label:"Net Income",key:"net",col:null,drill:null},
                    ].map(row=>(
                      <tr key={row.label} style={{borderTop:row.label==="Net Income"?`2px solid ${C.border}`:"none",background:row.label==="Net Income"?C.faint:"transparent"}}>
                        <td style={{...S.td,fontWeight:row.label==="Net Income"?"700":"400",color:C.muted,fontSize:"12px"}}>{row.label}</td>
                        {propData.map(({prop,...d})=>{
                          const val=d[row.key]||0;
                          const col=row.label==="Net Income"?(val>=0?C.teal:C.red):(row.col||C.text);
                          const drillRows=row.drill?row.drill({...d}):null;
                          return(
                            <td key={prop.id} style={{...S.td,fontWeight:row.label==="Net Income"?"700":"400",cursor:drillRows&&drillRows.length>0?"pointer":"default"}}
                              onClick={()=>drillRows&&drillRows.length>0&&setDrillData({title:`${prop.address} -- ${row.label}`,rows:drillRows})}>
                              <span style={{color:col}}>{row.label==="Net Income"&&val>=0?"+":""}{fmt(val)}</span>
                              {drillRows&&drillRows.length>0&&<span style={{fontSize:"10px",color:C.muted,marginLeft:"4px"}}>↗</span>}
                            </td>
                          );
                        })}
                        <td style={{...S.td,fontWeight:"700"}}>
                          {(()=>{const tot=propData.reduce((s,d)=>s+(d[row.key]||0),0);const col=row.label==="Net Income"?(tot>=0?C.teal:C.red):C.text;return <span style={{color:col}}>{row.label==="Net Income"&&tot>=0?"+":""}{fmt(tot)}</span>;})()}
                        </td>
                      </tr>
                    ))}
                  </tbody></table>
                </div>

                {/* Monthly combined */}
                {months.length>0&&(<>
                  <div style={S.sh}>Monthly -- All Properties</div>
                  <div style={{overflowX:"auto"}}>
                    <table style={{...S.tbl,minWidth:"500px"}}><thead>
                      <tr>
                        <th style={S.th}>Month</th>
                        {rentalProperties.map(p=><th key={p.id} style={{...S.th,color:p.color}}>{p.address.split(" ").slice(0,2).join(" ")}</th>)}
                        <th style={S.th}>Total Net</th>
                      </tr>
                    </thead><tbody>
                      {months.map(m=>{
                        const totNet=rentalProperties.reduce((s,p)=>{const d=monthMap[m][p.id]||{inc:0,exp:0};return s+(d.inc-d.exp);},0);
                        return(
                          <tr key={m}>
                            <td style={{...S.td,fontWeight:"700"}}>{monthLabel(m)}</td>
                            {rentalProperties.map(p=>{const d=monthMap[m][p.id]||{inc:0,exp:0};const net=d.inc-d.exp;return <td key={p.id} style={{...S.td,color:net>=0?C.teal:C.red,fontSize:"12px"}}>{net===0?"--":(net>=0?"+":"")+fmt(net)}</td>;  })}
                            <td style={{...S.td,fontWeight:"700",color:totNet>=0?C.teal:C.red}}>{totNet>=0?"+":""}{fmt(totNet)}</td>
                          </tr>
                        );
                      })}
                    </tbody></table>
                  </div>
                </>)}
              </>);
            })()}

            {/* -- FLIPS REPORT -- */}
            {reportTab==="flips"&&(()=>{
              return (<>
                <div style={{fontSize:"12px",color:C.muted,marginBottom:"16px"}}>Flip reports show all-time data -- date filter applies to expense breakdowns only.</div>

                {/* Per-flip P&L table */}
                <div style={S.sh}>Flip P&amp;L</div>
                <div style={S.card}><table style={S.tbl}><thead><tr>{["Flip","Status","Purchase","Reno Spent","Total In","Sale / ARV","Profit","ROI"].map(h=><th key={h} style={S.th}>{h}</th>)}</tr></thead><tbody>
                  {flips.length===0&&<tr><td colSpan={8} style={{...S.td,textAlign:"center",color:C.muted,padding:"24px"}}>No flips yet</td></tr>}
                  {flips.map(flip=>{
                    const spent=flipTotalSpent(flip.id);
                    const totalIn=(flip.purchasePrice||0)+spent;
                    const isSold=flip.status==="complete"&&flip.salePrice;
                    const profit=isSold?(flip.salePrice-totalIn):((flip.arv||0)-totalIn);
                    const roi=totalIn>0?(profit/totalIn*100):0;
                    return(
                      <tr key={flip.id}>
                        <td style={{...S.td,fontWeight:"700",color:flip.color}}>{flip.name}</td>
                        <td style={S.td}><span style={S.badge(isSold?C.teal:C.orange)}>{isSold?"SOLD":"Active"}</span></td>
                        <td style={S.td}>{fmt(flip.purchasePrice)}</td>
                        <td style={S.td}><span style={{cursor:"pointer",textDecoration:"underline dotted",textUnderlineOffset:"3px"}} onClick={()=>setDrillData({title:`${flip.name} -- All Expenses`,rows:flipExpenses(flip.id)})}>{fmt(spent)} ↗</span></td>
                        <td style={{...S.td,fontWeight:"700"}}>{fmt(totalIn)}</td>
                        <td style={S.td}>{fmt(isSold?flip.salePrice:flip.arv)}{!isSold&&<span style={{fontSize:"10px",color:C.muted}}> ARV</span>}</td>
                        <td style={{...S.td,fontWeight:"700",color:profit>=0?C.teal:C.red}}>{profit>=0?"+":""}{fmt(profit)}</td>
                        <td style={{...S.td,color:roi>=0?C.teal:C.red}}>{roi.toFixed(1)}%</td>
                      </tr>
                    );
                  })}
                </tbody></table></div>

                {/* Per-flip expense breakdown by category */}
                {flips.map(flip=>{
                  const allExp=flipExpenses(flip.id);
                  const catMap={};
                  allExp.forEach(e=>{if(!catMap[e.category])catMap[e.category]=[];catMap[e.category].push(e);});
                  const cats=Object.entries(catMap).sort((a,b)=>b[1].reduce((s,e)=>s+e.amount,0)-a[1].reduce((s,e)=>s+e.amount,0));
                  const total=allExp.reduce((s,e)=>s+e.amount,0);
                  if(cats.length===0)return null;
                  return(
                    <div key={flip.id}>
                      <div style={S.sh}>{flip.name} -- Cost Breakdown</div>
                      <div style={S.card}><table style={S.tbl}><thead><tr>{["Category","Amount","% of Reno",""].map(h=><th key={h} style={S.th}>{h}</th>)}</tr></thead><tbody>
                        {cats.map(([cat,rows])=>{
                          const amt=rows.reduce((s,e)=>s+e.amount,0);
                          const pct=total>0?(amt/total*100):0;
                          return(

            <label style={S.lbl}>Miles *</label>
            <input type="number" style={S.inp} placeholder="Auto-fills from odometer" value={tripForm.miles} onChange={e=>setTripForm(f=>({...f,miles:e.target.value}))}/>
            <label style={S.lbl}>Notes</label>
            <input style={S.inp} placeholder="Optional" value={tripForm.notes} onChange={e=>setTripForm(f=>({...f,notes:e.target.value}))}/>

          </div>

      {/* -- RENT PAYMENT MODAL -- */}

            <label style={S.lbl}>Property *</label>
            <select style={S.sel} value={rentIncForm.propertyId} onChange={e=>setRentIncForm(f=>({...f,propertyId:e.target.value}))}>
              <option value="">-- Select property --</option>
              {rentalProperties.map(p=><option key={p.id} value={p.id}>{p.address}</option>)}
            </select>
            <div style={S.row}>
              <div style={{flex:1}}><label style={S.lbl}>Date</label><input type="date" style={S.inp} value={rentIncForm.date} onChange={e=>setRentIncForm(f=>({...f,date:e.target.value}))}/></div>
              <div style={{flex:1}}><label style={S.lbl}>Amount ($) *</label><input type="number" style={S.inp} placeholder="0.00" value={rentIncForm.amount} onChange={e=>setRentIncForm(f=>({...f,amount:e.target.value}))}/></div>

          </div>
        </div>
      )}

        <div style={S.modal}>

            <div style={S.mt}>{editingId?"Edit Rental Expense":"Log Rental Expense"}</div>

              {receiptState==="idle"&&(<div style={{display:"flex",gap:"8px"}}>

                <button style={{flex:1,padding:"9px 8px",border:`1px dashed ${C.purple}`,borderRadius:"8px",background:C.purpleD,color:C.purple,cursor:"pointer",fontSize:"11px",fontWeight:"700"}} onClick={()=>{setScanTarget("rentExp");cameraRef.current?.click();}}>📷 Take Photo</button>

            </div>)}
            <label style={S.lbl}>Property *</label>

            <div style={S.row}>
              <div style={{flex:1}}><label style={S.lbl}>Date</label><input type="date" style={S.inp} value={rentExpForm.date} onChange={e=>setRentExpForm(f=>({...f,date:e.target.value}))}/></div>
              <div style={{flex:1}}><label style={S.lbl}>Amount ($) *</label><input type="number" style={S.inp} placeholder="0.00" value={rentExpForm.amount} onChange={e=>setRentExpForm(f=>({...f,amount:e.target.value}))}/></div>
            </div>
            <label style={S.lbl}>Description</label>
            <input style={S.inp} placeholder="e.g. Furnace repair" value={rentExpForm.desc} onChange={e=>setRentExpForm(f=>({...f,desc:e.target.value}))}/>

            <select style={S.sel} value={rentExpForm.category} onChange={e=>setRentExpForm(f=>({...f,category:e.target.value}))}>
              {["Insurance","Repairs & Maintenance","Taxes","Mortgages & Loans","Utilities","Management Fees","Other"].map(c=><option key={c}>{c}</option>)}
            </select>
            {editingId&&rentExpForm.receiptB64&&<div style={{marginTop:"8px"}}>{rentExpForm.receiptIsPdf?<PdfViewer b64={rentExpForm.receiptB64}/>:<img src={`data:${rentExpForm.receiptMediaType};base64,${rentExpForm.receiptB64}`} alt="Receipt" style={{width:"100%",borderRadius:"6px",maxHeight:"140px",objectFit:"contain",background:"#fff"}}/>}</div>}
            <div style={S.br}>{editingId&&<button style={{...S.btn,background:C.red}} onClick={()=>{deleteRentExp(editingId);setModal(null);setEditingId(null);}}>Delete</button>}<button style={S.btn} onClick={saveRentExp}>{editingId?"Update":"Save Expense"}</button><button style={S.bgh} onClick={()=>{setModal(null);setEditingId(null);setRentExpForm(blankRentExp);setReceiptState("idle");}}>Cancel</button></div>
          </div>
        </div>

      {modal==="addProp"&&(

            <input style={S.inp} placeholder="e.g. 524 Speer St" value={propForm.address} onChange={e=>setPropForm(f=>({...f,address:e.target.value}))}/>
            <label style={S.lbl}>City, State</label>
            <input style={S.inp} placeholder="e.g. Belle Vernon, PA" value={propForm.city} onChange={e=>setPropForm(f=>({...f,city:e.target.value}))}/>
            <div style={S.row}>
              <div style={{flex:1}}><label style={S.lbl}>Monthly Rent Target</label><input type="number" style={S.inp} placeholder="0.00" value={propForm.monthlyRent} onChange={e=>setPropForm(f=>({...f,monthlyRent:e.target.value}))}/></div>
              <div style={{flex:1}}><label style={S.lbl}>Color</label><input type="color" style={{...S.inp,height:"42px",padding:"3px"}} value={propForm.color} onChange={e=>setPropForm(f=>({...f,color:e.target.value}))}/></div>

            {editingId&&(
              <><label style={S.lbl}>Status</label>
              <div style={{display:"flex",gap:"8px"}}>
                {["active","vacant","sold"].map(s=><button key={s} style={{...S.tb(propForm.status===s,s==="active"?C.teal:s==="vacant"?C.yellow:C.muted),flex:1,padding:"7px",fontSize:"11px",textTransform:"capitalize"}} onClick={()=>setPropForm(f=>({...f,status:s}))}>{s}</button>)}
              </div></>
            )}
            <div style={S.br}>
              {editingId&&<button style={{...S.btn,background:C.red}} onClick={()=>{deleteProp(editingId);setModal(null);setEditingId(null);}}>Delete</button>}

          </div>
