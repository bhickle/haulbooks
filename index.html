      {/* -- GLOBAL SEARCH OVERLAY -- */}
      {globalSearch&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.88)",zIndex:300,display:"flex",flexDirection:"column",alignItems:"center",paddingTop:"60px",padding:"60px 16px 16px"}} onClick={e=>e.target===e.currentTarget&&setGlobalSearch(false)}>
          <div style={{width:"100%",maxWidth:"680px"}}>
            {/* Search input */}
            <div style={{position:"relative",marginBottom:"16px"}}>
              <input
                autoFocus
                style={{...S.inp,fontSize:"18px",padding:"14px 16px 14px 48px",borderRadius:"12px",border:`1px solid ${C.border}`,background:C.surface}}
                placeholder="Search expenses, jobs, rent payments..."
                value={globalQuery}
                onChange={e=>setGlobalQuery(e.target.value)}
                onKeyDown={e=>e.key==="Escape"&&setGlobalSearch(false)}
              />
              <span style={{position:"absolute",left:"16px",top:"50%",transform:"translateY(-50%)",fontSize:"18px",pointerEvents:"none"}}>🔍</span>
              {globalQuery&&<button onClick={()=>setGlobalQuery("")} style={{position:"absolute",right:"14px",top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:"20px",lineHeight:1}}>×</button>}
            </div>

            {/* Results */}
            {globalQuery.length>1&&(()=>{
              const q = globalQuery.toLowerCase();
              const matchExp = expenses.filter(e=>
                e.desc.toLowerCase().includes(q)||
                (e.payee||"").toLowerCase().includes(q)||
                (e.notes||"").toLowerCase().includes(q)||
                e.category.toLowerCase().includes(q)
              ).slice(0,15);
              const matchInc = income.filter(i=>
                (i.customer||"").toLowerCase().includes(q)||
                (i.notes||"").toLowerCase().includes(q)||
                (i.jobType||"").toLowerCase().includes(q)
              ).slice(0,8);
              const total = matchExp.length + matchInc.length;

              if(total===0) return (
                <div style={{textAlign:"center",color:C.muted,padding:"40px",fontSize:"14px"}}>
                  No results for "{globalQuery}"
                </div>
              );

              return (
                <div style={{background:C.surface,borderRadius:"12px",border:`1px solid ${C.border}`,overflow:"hidden",maxHeight:"60vh",overflowY:"auto"}}>
                  {matchExp.length>0&&<>
                    <div style={{padding:"10px 16px",fontSize:"10px",color:C.muted,letterSpacing:"2px",textTransform:"uppercase",borderBottom:`1px solid ${C.border}`,background:C.faint}}>
                      Expenses ({matchExp.length})
                    </div>
                    {matchExp.map(e=>{
                      const flip=e.flipId?flips.find(f=>f.id===e.flipId):null;
                      const prop=e.propertyId?rentalProperties.find(p=>p.id===e.propertyId):null;
                      const typeLabel=e.type==="business"?"Hauling":flip?.name||prop?.address||"Rental";
                      const typeCol=e.type==="business"?C.orange:e.type==="flip"?C.teal:C.purple;
                      return(
                        <div key={e.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 16px",borderBottom:`1px solid ${C.faint}`,cursor:"pointer"}}
                          onClick={()=>{setGlobalSearch(false);setViewingExpense(e);setModal("viewExpense");}}>
                          <div style={{flex:1,minWidth:0}}>
                            <div style={{display:"flex",alignItems:"center",gap:"8px"}}>
                              <span style={S.badge(typeCol)}>{typeLabel}</span>
                              <span style={{fontWeight:"600",fontSize:"13px"}}>{e.desc}</span>
                              {e.receiptB64&&<span style={{fontSize:"11px"}}>🧾</span>}
                            </div>
                            <div style={{fontSize:"11px",color:C.muted,marginTop:"2px"}}>{fmtDate(e.date)} · {e.category} · {e.payee||"--"}</div>
                          </div>
                          <div style={{fontWeight:"700",color:C.red,marginLeft:"12px",whiteSpace:"nowrap"}}>{fmt(e.amount)}</div>
                        </div>
                      );
                    })}
                  </>}
                  {matchInc.length>0&&<>
                    <div style={{padding:"10px 16px",fontSize:"10px",color:C.muted,letterSpacing:"2px",textTransform:"uppercase",borderBottom:`1px solid ${C.border}`,background:C.faint}}>
                      Income ({matchInc.length})
                    </div>
                    {matchInc.map(i=>{
                      const prop=i.jobType==="Rent Payment"?rentalProperties.find(p=>p.id===i.propertyId):null;
                      const isRent=i.jobType==="Rent Payment";
                      return(
                        <div key={i.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 16px",borderBottom:`1px solid ${C.faint}`,cursor:"pointer"}}
                          onClick={()=>{setGlobalSearch(false);setViewingJob(i);setModal("viewJob");}}>
                          <div style={{flex:1,minWidth:0}}>
                            <div style={{display:"flex",alignItems:"center",gap:"8px"}}>
                              <span style={S.badge(isRent?C.purple:C.teal)}>{isRent?(prop?.address||"Rent"):i.jobType}</span>

                        </div>
                      );
                    })}
                  </>}
                </div>
              );
            })()}

            {globalQuery.length<=1&&(
              <div style={{textAlign:"center",color:C.muted,padding:"32px",fontSize:"13px"}}>
                Type at least 2 characters to search
              </div>
            )}

            <div style={{textAlign:"center",marginTop:"12px",fontSize:"11px",color:C.muted}}>

            </div>
          </div>
        </div>

        <div style={S.modal} onClick={e=>e.target===e.currentTarget&&setQuickNew(false)}>

              <button style={{padding:"16px",border:`1px solid ${C.teal}44`,borderRadius:"10px",background:C.tealD,color:C.teal,cursor:"pointer",fontSize:"14px",fontWeight:"700",textAlign:"left",display:"flex",alignItems:"center",gap:"12px"}}
